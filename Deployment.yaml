apiVersion: apps/v1
kind: Deployment

metadata:
  name: mini-deployment
  labels:
    app: mini-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: mini-app

  template:
    metadata:
      labels:
        app: mini-app

    spec:
      containers:
        - name: mini-container
          image: bhuvana20/mini:v1.0.0
          ports:
            - containerPort: 5000
